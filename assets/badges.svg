<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 64" role="img"
     aria-label="FlashPaste capabilities: GNOME Wayland support, kitty integration, tmux integration, MIT license, sub-15 millisecond latency">
  <title>FlashPaste capability tags</title>

  <defs>
    <style>
      .pill   { fill: #161b22; stroke: #30363d; }
      .pill-l { fill: #21262d; }
      .lbl    { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: 11px; fill: #c9d1d9; }
      .val    { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: 11px; font-weight: 700; }
      .v-ok   { fill: #7ee787; }
      .v-blue { fill: #79c0ff; }
      .v-warn { fill: #f0883e; }

      @keyframes shimmer { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
      g.tag { animation: shimmer 2.8s ease-in-out infinite; }
      g.tag:nth-of-type(2) { animation-delay: 0.4s; }
      g.tag:nth-of-type(3) { animation-delay: 0.8s; }
      g.tag:nth-of-type(4) { animation-delay: 1.2s; }
      g.tag:nth-of-type(5) { animation-delay: 1.6s; }
      g.tag:nth-of-type(6) { animation-delay: 2.0s; }
    </style>
  </defs>

  <rect width="720" height="64" fill="transparent"/>

  <g class="tag" transform="translate(8, 20)">
    <rect class="pill-l" width="62" height="22" rx="6"/>
    <rect class="pill"   x="62" width="60" height="22" rx="6"/>
    <text x="31"  y="15" text-anchor="middle" class="lbl">stack</text>
    <text x="92"  y="15" text-anchor="middle" class="val v-blue">Wayland</text>
  </g>

  <g class="tag" transform="translate(132, 20)">
    <rect class="pill-l" width="52" height="22" rx="6"/>
    <rect class="pill"   x="52" width="56" height="22" rx="6"/>
    <text x="26"  y="15" text-anchor="middle" class="lbl">term</text>
    <text x="80"  y="15" text-anchor="middle" class="val v-ok">kitty</text>
  </g>

  <g class="tag" transform="translate(118, 20)" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.6s" begin="0.4s" fill="freeze"/>
  </g>

  <g class="tag" transform="translate(246, 20)">
    <rect class="pill-l" width="62" height="22" rx="6"/>
    <rect class="pill"   x="62" width="52" height="22" rx="6"/>
    <text x="31"  y="15" text-anchor="middle" class="lbl">mux</text>
    <text x="88"  y="15" text-anchor="middle" class="val v-ok">tmux</text>
  </g>

  <g class="tag" transform="translate(360, 20)">
    <rect class="pill-l" width="62" height="22" rx="6"/>
    <rect class="pill"   x="62" width="68" height="22" rx="6"/>
    <text x="31"  y="15" text-anchor="middle" class="lbl">tier 3</text>
    <text x="96"  y="15" text-anchor="middle" class="val v-ok">&lt;15 ms</text>
  </g>

  <g class="tag" transform="translate(490, 20)">
    <rect class="pill-l" width="62" height="22" rx="6"/>
    <rect class="pill"   x="62" width="56" height="22" rx="6"/>
    <text x="31"  y="15" text-anchor="middle" class="lbl">lang</text>
    <text x="90"  y="15" text-anchor="middle" class="val v-warn">Rust + bash</text>
  </g>

  <g class="tag" transform="translate(610, 20)">
    <rect class="pill-l" width="62" height="22" rx="6"/>
    <rect class="pill"   x="62" width="40" height="22" rx="6"/>
    <text x="31"  y="15" text-anchor="middle" class="lbl">license</text>
    <text x="82"  y="15" text-anchor="middle" class="val v-blue">MIT</text>
  </g>
</svg>
