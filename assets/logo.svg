<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="200" fill="url(#ink)"/>
  <!-- Lightning bolt -->
  <g transform="translate(60,30)" filter="url(#glow)">
    <path d="M 60 0 L 25 80 L 55 80 L 30 140 L 90 50 L 60 50 L 80 0 Z"
          fill="url(#grad)" stroke="#FCD34D" stroke-width="2"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="115" font-family="ui-monospace, Menlo, monospace"
        font-size="78" font-weight="800" fill="#F8FAFC" letter-spacing="-2">
    flashpaste
  </text>
  <!-- Tagline -->
  <text x="202" y="155" font-family="ui-monospace, Menlo, monospace"
        font-size="18" font-weight="400" fill="#FBBF24">
    sub-120ms image paste for TUI agents
  </text>
  <!-- Pulse dot -->
  <circle cx="630" cy="100" r="8" fill="#10B981">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="650" y="106" font-family="ui-monospace, Menlo, monospace"
        font-size="14" fill="#10B981">LIVE</text>
</svg>
